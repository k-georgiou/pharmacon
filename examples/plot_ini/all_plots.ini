#    Copyright© 2026  Kyriakos Georgiou
# ============================================================================
# Pharmacon — Master Plot Config File
# ----------------------------------------------------------------------------
# This single file contains a section for EVERY plot type Pharmacon supports.
# Pass it to any `pharmacon plot ...` subcommand with:
#
#     pharmacon plot pta  -i run.pta -c examples/plot_ini/all_plots.ini
#     pharmacon plot pca  -i run.pta -c examples/plot_ini/all_plots.ini
#
# Only the sections whose aliases match the invoked plot type are read — the
# rest are silently ignored, so keeping them all in one file is safe.
#
# Each section below is the minimum-working example; for the FULL list of
# every variable you can set, see the individual files in this directory
# (pli_heatmap_1.ini, pca_scatter.ini, …).
# ============================================================================


# ----------------------------------------------------------------------------
# PROTEIN–LIGAND INTERACTIONS — STACKED COLUMN (Type 1)
# ----------------------------------------------------------------------------
[PLI-STACKED-COLUMN-1]
fig_dpi           = 800
fig_basename      = pli_stacked_column_1
fig_format        = png
fig_title         = Protein–Ligand Interactions — Stacked 1
threshold         = 0.02
aa3_to_aa1        = True
enable_grid       = True
legend_n_col      = 4
color_hydrophobic = "#b39ddb"
color_hydrogen_bonds = "#f1c40f"


# ----------------------------------------------------------------------------
# PROTEIN–LIGAND INTERACTIONS — STACKED COLUMN (Type 2: backbone vs side-chain)
# ----------------------------------------------------------------------------
[PLI-STACKED-COLUMN-2]
fig_dpi          = 800
fig_basename     = pli_stacked_column_2
fig_title        = Protein–Ligand Interactions — Stacked 2
color_backbone   = "#b28dff"
color_side_chain = "#aff8db"
aa3_to_aa1       = True


# ----------------------------------------------------------------------------
# PROTEIN–LIGAND INTERACTIONS — HEATMAP (Type 1: residue × frame)
# ----------------------------------------------------------------------------
[PLI-HEATMAP-1]
fig_dpi          = 600
fig_basename     = pli_heatmap_1
fig_title        = Protein–Ligand Interaction Heatmap
cmap             = viridis
vmin             = 0.0
threshold        = 0.02


# ----------------------------------------------------------------------------
# PROTEIN–LIGAND INTERACTIONS — HEATMAP (Type 2: interaction × frame)
# ----------------------------------------------------------------------------
[PLI-HEATMAP-2]
fig_dpi          = 800
fig_basename     = pli_heatmap_2
fig_title        = Protein–Ligand Interaction Frequency Heatmap
normalize        = none
drop_empty_rows  = True
cmap             = viridis


# ----------------------------------------------------------------------------
# PROTEIN–LIGAND INTERACTIONS — PIE CHARTS
# ----------------------------------------------------------------------------
[PLI-PIE-CHARTS-1]
fig_dpi          = 150
top_n            = 20
collage          = True
collage_cols     = 5
make_pdf         = False
make_overall     = True
color_backbone   = "#b28dff"
color_side_chain = "#aff8db"


# ----------------------------------------------------------------------------
# PROTEIN–LIGAND INTERACTIONS — LIGAND MONITOR
# ----------------------------------------------------------------------------
[PLI-LIGAND-MONITOR]
fig_dpi          = 300
fig_basename     = pli_ligand_monitor
cmap             = viridis
drop_empty_rows  = True
drop_empty_cols  = True


# ----------------------------------------------------------------------------
# PROTEIN–PROTEIN INTERACTIONS — TIMELINE (top pairs)
# ----------------------------------------------------------------------------
[PPI-TIMELINE-PAIRS]
fig_dpi          = 300
fig_basename     = ppi_timeline_pairs
top_n            = 50
threshold        = 0.02
cmap             = gnuplot


# ----------------------------------------------------------------------------
# PROTEIN–PROTEIN INTERACTIONS — HEATMAP
# ----------------------------------------------------------------------------
[PPI-HEATMAP]
fig_dpi          = 300
fig_basename     = ppi_heatmap
cmap             = viridis
symmetric        = True
threshold        = 0.02


# ----------------------------------------------------------------------------
# PROTEIN–PROTEIN INTERACTIONS — STACKED COLUMN
# ----------------------------------------------------------------------------
[PPI-STACKED-COLUMN]
fig_dpi          = 300
fig_basename     = ppi_stacked_column
threshold        = 0.05
bar_width        = 0.9
aa3_to_aa1       = True


# ----------------------------------------------------------------------------
# UNIVERSAL PTA TIME SERIES (RMSD / angles / distances)
# ----------------------------------------------------------------------------
[PTA-UNIFIED]
fig_dpi          = 300
fig_format       = png
x_axis           = time_ns
line_width       = 1.5
show_std_band    = True
std_band_alpha   = 0.25
enable_grid      = True


# ----------------------------------------------------------------------------
# RMSF — PER-ATOM PROFILE (one curve per selection)
# ----------------------------------------------------------------------------
[PTA-RMSF]
fig_dpi          = 300
fig_format       = png            # png | svg | pdf | jpg | tif
fig_title        = RMSF Profile
x_label          = Residue
y_label          = RMSF (Å)
x_axis           = resid          # resid | atom_index | position | atom_name
# Axis limits: "auto" or numeric (e.g. y_min=0, y_max=3.5)
y_min            = auto
y_max            = auto
# Per-selection color overrides:
#   colors_by_label = calpha:"#d62728", backbone:"#1f77b4"
colors_by_label  =
# xtick_format examples (empty = auto):
#   {atom_name}                — ligand-style labels
#   {atom_index} {atom_name}   — index + name
#   {resname}{resid}-{atom_name}
xtick_format     =
xtick_rotation   = auto
line_width       = 1.5
show_std_band    = True           # mean ± std band on merged .pta
std_band_alpha   = 0.25
# Shaded background regions; start/end use the same units as x_axis.
#   shading = 0,10,"#888888"; 11,100,"#ffa500"
shading          =
shading_alpha    = 0.25
plot_multiple    = False          # True = one figure per selection
enable_grid      = True


# ----------------------------------------------------------------------------
# PCA — TIME SERIES
# ----------------------------------------------------------------------------
[PCA-TIMESERIES]
fig_dpi          = 300
fig_basename     = pca_timeseries
pcs              = 1, 2, 3
line_width       = 1.5


# ----------------------------------------------------------------------------
# PCA — SCATTER
# ----------------------------------------------------------------------------
[PCA-SCATTER]
fig_dpi          = 300
fig_basename     = pca_scatter
pc_x             = 1
pc_y             = 2
scatter_size     = 20
scatter_alpha    = 0.8
cmap             = viridis


# ----------------------------------------------------------------------------
# PCA — EXPLAINED VARIANCE (SCREE PLOT)
# ----------------------------------------------------------------------------
[PCA-VARIANCE-RATIO]
fig_dpi          = 300
fig_basename     = pca_variance_ratio
bar_alpha        = 0.8
cumulative_line  = True


# ----------------------------------------------------------------------------
# PCA — FREE-ENERGY SURFACE HEATMAP
# ----------------------------------------------------------------------------
[PCA-FES-HEATMAP]
components       = 1, 2
plot_multiple    = True
plot_in_one      = True
bins             = 60
smooth_sigma     = 1.0
temperature      = 310.0
cmap             = plasma
n_levels         = 12


# ----------------------------------------------------------------------------
# PCA — PROBABILITY DENSITY HEATMAP
# ----------------------------------------------------------------------------
[PCA-PROBABILITY-HEATMAP]
components       = 1, 2
plot_multiple    = True
plot_in_one      = True
bins             = 60
smooth_sigma     = 1.0
cmap             = viridis
n_levels         = 12
