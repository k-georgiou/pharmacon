# ============================================================================
# Pharmacon — Plot Config: Number of Hydrogen Bonds per Frame
# ----------------------------------------------------------------------------
# Grouping   : H-bond count vs frame (time series).
# Applies to : .pta files produced by `trajectory h-bonds` (non-merged only)
# Alias names recognized by the parser:
#   HBONDS-COUNT-PER-FRAME / HBONDS_COUNT_PER_FRAME / HB-COUNT / HB_COUNT
# ============================================================================

[HBONDS-COUNT-PER-FRAME]

# ---------------- FIGURE ----------------
fig_size_width   = 8
fig_size_height  = 5
fig_dpi          = 300
fig_format       = png
bg_color         = white

# ---------------- TITLES / LABELS ----------------
fig_title        = Hydrogen Bonds per Frame
x_label          = Frame
y_label          = Number of H-bonds
x_axis           = frame_index    # frame_index | time_ns | time_ps | time_us

# ---------------- LINE ----------------
line_width       = 1.5
line_style       = solid
# line_colors accepts a comma-separated list (the first color is used here):
#   line_colors = "#1f77b4", "#ff7f0e"

# ---------------- GRID ----------------
enable_grid      = True
grid_style       = dashed
grid_alpha       = 0.4
