# ============================================================================
# Pharmacon — Plot Config: PCA Time Series (projections vs time)
# ----------------------------------------------------------------------------
# Applies to : .pta files containing a PCA dataset
# Alias names recognized by the parser:
#   PCA-TIMESERIES
#   PCA_TIMESERIES
# ============================================================================

[PCA-TIMESERIES]

# ---------------- FIGURE ----------------
fig_size_width   = 10
fig_size_height  = 6
fig_dpi          = 300
fig_basename     = pca_timeseries
fig_format       = png
fig_transparent  = False
tight_layout     = True
bg_color         = white

# ---------------- TITLES / LABELS ----------------
fig_title        = PCA Time Series
x_label          = Time (ps)
y_label          = Projection Value

# ---------------- FONTS ----------------
font_family       = dejavu sans
font_size_title   = 14
font_size_label   = 12
font_size_ticks   = 10
font_size_legend  = 10
font_weight_title = bold

# ---------------- LINES ----------------
line_width       = 1.5
line_alpha       = 0.9

# ---------------- PC SELECTION ----------------
pcs              = 1, 2, 3         # list of PC indices to plot

# ---------------- LEGEND ----------------
disable_legend   = False
legend_loc       = best
legend_frame     = True
legend_alpha     = 1.0

# ---------------- GRID ----------------
enable_grid      = True
grid_style       = dashed
grid_alpha       = 0.3

disable_title    = False
