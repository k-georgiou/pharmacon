# ============================================================================
# Pharmacon — Plot Config: Protein–Ligand Interactions Pie Charts (Type 1)
# ----------------------------------------------------------------------------
# Grouping   : one pie per residue (Backbone vs Side-chain), plus a collage
# Applies to : .pta files (non-merged only)
# Alias names recognized by the parser:
#   PLI-PIE-CHARTS-1
#   PLI_PIE_CHARTS_1
#   PL-INTERACTIONS-PIE-CHARTS-1
#   PL_INTERACTIONS_PIE_CHARTS_1
# ============================================================================

[PLI-PIE-CHARTS-1]

# ---------------- FIGURE ----------------
fig_size         = 5.0            # square figure size (inches)
fig_dpi          = 150
fig_format       = png
fig_transparent  = False
tight_layout     = True
bg_color         = white

# ---------------- DATA SELECTION ----------------
top_n            = 20             # keep the top-N most interacting residues

# ---------------- COLLAGE ----------------
collage          = True           # produce a combined collage figure
collage_cols     = 5              # columns in the collage grid
collage_pad      = 0.5

# ---------------- OUTPUTS ----------------
make_pdf         = False          # also save a multi-page PDF
make_overall     = True           # also render an aggregated "overall" pie

# ---------------- DISABLE FLAGS ----------------
disable_title        = False
disable_labels       = False
disable_autopct      = False      # hide the per-slice percentages
disable_overall_title = False

# ---------------- FONTS ----------------
font_size_title   = 28
font_size_pct     = 16
font_weight_title = bold

# ---------------- COLORS ----------------
color_backbone   = #b28dff
color_side_chain = #aff8db

# ---------------- LABELING ----------------
x_axis_representation = chainid:resnameresid
