# ============================================================================
# Pharmacon — Plot Config: Protein–Protein Interaction Heatmap
# ----------------------------------------------------------------------------
# Grouping   : residue × residue contact frequency map
# Applies to : .pta files
# Alias names recognized by the parser:
#   PPI-HEATMAP
#   PPI_HEATMAP
#   PP-HEATMAP
#   PP_HEATMAP
# ============================================================================

[PPI-HEATMAP]

# ---------------- FIGURE ----------------
fig_size_width   = 16
fig_size_height  = 14
fig_dpi          = 300
fig_basename     = ppi_heatmap
fig_format       = png
fig_transparent  = False
tight_layout     = True
bg_color         = white

# ---------------- TITLES / LABELS ----------------
fig_title        = Protein–Protein Contact Frequency
x_label          = Residue
y_label          = Residue

# ---------------- FONTS ----------------
font_family       = dejavu sans
font_size_title   = 20
font_weight_title = bold
font_size_label   = 16
font_weight_label = bold
font_size_x       = 8
font_weight_x     = normal
font_size_y       = 8
font_weight_y     = normal
font_size_cbar    = 12
font_weight_cbar  = normal

# ---------------- TICKS ----------------
x_tick_rotation  = 90.0
y_tick_rotation  = 0.0

# ---------------- FILTERS ----------------
threshold        = 0.02           # drop pairs below this mean frequency
min_total        = 0.0            # drop residues with row-sum below this
top_n            = 0              # 0 = keep all; N = keep N strongest pairs
symmetric        = True           # symmetrize residue×residue matrix

# ---------------- LABELING ----------------
representation   = chainid:resnameresid
aa3_to_aa1       = False
renumber         = False
renumber_int     =
alter_chains     = False
alter_segments   = False
alter_chains_str   =
alter_segments_str =

# ---------------- VALUE MAPPING ----------------
cmap             = viridis
vmin             = 0.0
vmax             =                # empty = auto
interpolation    = nearest

# ---------------- GRID ----------------
enable_grid      = False
grid_color       = black
grid_linewidth   = 0.2

# ---------------- COLORBAR ----------------
disable_colorbar = False
cbar_orientation = vertical
cbar_shrink      = 1.0
cbar_pad         = 0.04

# ---------------- DISABLE FLAGS ----------------
disable_title    = False
disable_x_axis   = False
disable_y_axis   = False
disable_x_label  = False
disable_y_label  = False
disable_ticks    = False
