# ============================================================================
# Pharmacon — Plot Config: PCA Free Energy Surface (FES) Heatmap
# ----------------------------------------------------------------------------
# Applies to : .pta files with a PCA dataset
# Alias names recognized by the parser:
#   PCA-FES-HEATMAP
#   PCA_FES_HEATMAP
#   PCA FES HEATMAP
#   PCA FREE ENERGY HEATMAP
# ============================================================================

[PCA-FES-HEATMAP]

# ---------------- COMPONENTS ----------------
# Pair(s) of principal components to project onto.
# Accepted forms: "1, 2"  →  single pair
#                 "1 2, 3 4"  →  two pairs (with plot_multiple=True)
components       = 1, 2
plot_multiple    = True            # compute multiple PC pairs
plot_in_one      = True            # draw them on a single figure

# ---------------- CALCULATION ----------------
bins             = 60              # histogram bins per axis
smooth_sigma     = 1.0             # Gaussian smoothing (σ)
temperature      = 310.0           # in Kelvin (for ΔG = -kT·ln(P))

# ---------------- CONTOUR / HEATMAP ----------------
cmap             = plasma
n_levels         = 12              # number of contour levels

# ---------------- FIGURE ----------------
fig_size_width   = 8
fig_size_height  = 6
fig_dpi          = 600
fig_basename     = pca_heatmap_fes
fig_format       = png
fig_transparent  = False
tight_layout     = True
bg_color         = white

# ---------------- TITLES / LABELS ----------------
fig_title        =                 # empty → auto ("FES PC1–PC2")
x_label          =
y_label          =

# ---------------- FONTS ----------------
font_family       = dejavu sans
font_size_title   = 14
font_size_label   = 12
font_size_ticks   = 10
font_weight_title = bold

# ---------------- GRID ----------------
enable_grid      = True
grid_style       = dashed
grid_alpha       = 0.3

disable_title    = False
