# ============================================================================
# Pharmacon — Plot Config: PPI Timeline for Top Residue–Residue Pairs
# ----------------------------------------------------------------------------
# Grouping   : residue-pair (rows) × frame (columns), heatmap
# Applies to : .pta files (non-merged only)
# Alias names recognized by the parser:
#   PPI-TIMELINE-PAIRS
#   PPI_TIMELINE_PAIRS
#   PP-TIMELINE
#   PP_TIMELINE
# ============================================================================

[PPI-TIMELINE-PAIRS]

# ---------------- FIGURE ----------------
fig_size_width   = 14
fig_size_height  = 8
fig_dpi          = 300
fig_basename     = ppi_timeline_pairs
fig_format       = png
fig_transparent  = False
tight_layout     = True
bg_color         = white

# ---------------- TITLES / LABELS ----------------
fig_title        = Top Interaction Pairs – Timeline
x_label          = Frame
y_label          = Residue Pair

# ---------------- FONTS ----------------
font_family       = dejavu sans
font_size_x       = 10
font_weight_x     = normal
font_size_y       = 10
font_weight_y     = normal
font_size_label   = 14
font_weight_label = bold
font_size_title   = 18
font_weight_title = bold
font_size_cbar    = 10
font_weight_cbar  = normal

# ---------------- TICKS ----------------
x_tick_rotation  = 0.0
y_tick_rotation  = 0.0

# ---------------- DATA SELECTION ----------------
top_n            = 50             # keep the N strongest pairs
threshold        = 0.02
drop_empty_rows  = True

# ---------------- RESIDUE LABELING ----------------
representation   = chainid:resnameresid
aa3_to_aa1       = False
renumber         = False
renumber_int     =
alter_chains     = False
alter_segments   = False
alter_chains_str   =
alter_segments_str =

# ---------------- VALUE MAPPING ----------------
cmap             = gnuplot
vmin             = 0.0
vmax             = 1.0
interpolation    = nearest

# ---------------- GRID ----------------
enable_grid      = False
grid_color       = black
grid_linewidth   = 0.2

# ---------------- COLORBAR ----------------
disable_colorbar = False
cbar_orientation = vertical
cbar_shrink      = 1.0
cbar_pad         = 0.04

# ---------------- DISABLE FLAGS ----------------
disable_title    = False
disable_x_axis   = False
disable_y_axis   = False
disable_x_label  = False
disable_y_label  = False
disable_ticks    = False
