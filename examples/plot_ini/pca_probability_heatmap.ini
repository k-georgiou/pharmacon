# ============================================================================
# Pharmacon — Plot Config: PCA Probability Density Heatmap
# ----------------------------------------------------------------------------
# Applies to : .pta files with a PCA dataset
# Alias names recognized by the parser:
#   PCA-PROBABILITY-HEATMAP
#   PCA_PROBABILITY_HEATMAP
#   PCA PROBABILITY HEATMAP
# ============================================================================

[PCA-PROBABILITY-HEATMAP]

# ---------------- COMPONENTS ----------------
components       = 1, 2
plot_multiple    = True
plot_in_one      = True

# ---------------- CALCULATION ----------------
bins             = 60
smooth_sigma     = 1.0

# ---------------- HEATMAP ----------------
cmap             = viridis
n_levels         = 12

# ---------------- FIGURE ----------------
fig_size_width   = 8
fig_size_height  = 6
fig_dpi          = 600
fig_basename     = pca_heatmap_probability
fig_format       = png
fig_transparent  = False
tight_layout     = True
bg_color         = white

# ---------------- TITLES / LABELS ----------------
fig_title        =
x_label          =
y_label          =

# ---------------- FONTS ----------------
font_family       = dejavu sans
font_size_title   = 14
font_size_label   = 12
font_size_ticks   = 10
font_weight_title = bold

# ---------------- GRID ----------------
enable_grid      = True
grid_style       = dashed
grid_alpha       = 0.3

disable_title    = False
