# ============================================================================
# Pharmacon — Plot Config: Universal PTA Time-series
# ----------------------------------------------------------------------------
# Used for RMSD, RMSF, Rg, SASA, hydrogen-bond counts, salt-bridge counts, …
# Applies to : .pta files (single or merged, any time-series dataset)
# Alias names recognized by the parser:
#   PTA-UNIFIED
#   PTA_UNIFIED
# ============================================================================

[PTA-UNIFIED]

# ---------------- FIGURE ----------------
fig_size_width   = 8
fig_size_height  = 5
fig_dpi          = 300
fig_format       = png
fig_transparent  = False
tight_layout     = True
bg_color         = white

# ---------------- TITLES / LABELS ----------------
fig_title        = PTA Timeseries
x_label          = Time (ns)
y_label          = Value
x_axis           = time_ns        # time_ns | time_ps | frame

# ---------------- FONTS ----------------
font_family       = dejavu sans
font_size_title   = 14
font_weight_title = bold
font_size_label   = 10
font_weight_label = normal
font_size_ticks   = 8
font_size_legend  = 8
font_weight_legend = normal

# ---------------- LINES ----------------
line_width       = 1.5
line_alpha       = 1.0
line_style       = solid           # solid | dashed | dotted | dashdot

# Accepts a comma-separated list of colors; cycled per series:
line_colors      = #1f77b4, #ff7f0e, #2ca02c, #d62728, #9467bd, #8c564b, #e377c2, #7f7f7f, #bcbd22, #17becf
cycle_colors     = True

# ---------------- STD BAND (mean ± std for merged .pta) ----------------
show_std_band    = True
std_band_alpha   = 0.25

# ---------------- GRID ----------------
enable_grid      = True
grid_style       = dashed
grid_alpha       = 0.4

# ---------------- LEGEND ----------------
disable_legend   = False
legend_frame     = True
legend_alpha     = 1.0

# ---------------- BEHAVIOR ----------------
plot_every_n     = 1               # downsample: plot every Nth frame
plot_multiple    = False           # overlay multiple series on one axis
disable_title    = False
