# ============================================================================
# Pharmacon — Plot Config: PCA Scatter (two components)
# ----------------------------------------------------------------------------
# Applies to : .pta files with a PCA dataset
# Alias names recognized by the parser:
#   PCA-SCATTER
#   PCA_SCATTER
# ============================================================================

[PCA-SCATTER]

# ---------------- FIGURE ----------------
fig_size_width   = 8
fig_size_height  = 8
fig_dpi          = 300
fig_basename     = pca_scatter
fig_format       = png
fig_transparent  = False
tight_layout     = True
bg_color         = white

# ---------------- TITLES / LABELS ----------------
fig_title        = PCA Scatter
x_label          = PC1
y_label          = PC2

# ---------------- FONTS ----------------
font_family       = dejavu sans
font_size_title   = 14
font_size_label   = 12
font_size_ticks   = 10
font_weight_title = bold

# ---------------- COMPONENTS ----------------
pc_x             = 1
pc_y             = 2

# ---------------- SCATTER STYLING ----------------
scatter_size     = 20
scatter_alpha    = 0.8
cmap             = viridis

# ---------------- COLORBAR ----------------
disable_colorbar = False

# ---------------- GRID ----------------
enable_grid      = True
grid_style       = dashed
grid_alpha       = 0.3

disable_title    = False
