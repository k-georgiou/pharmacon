# ============================================================================
# Pharmacon — Plot Config: Hydrogen-Bond Network Graph
# ----------------------------------------------------------------------------
# Nodes = residues, edges = H-bonds (weighted by occupancy). Built from a mode
# table (mode2 = once-per-frame, so frequency is a 0–1 occupancy).
# Tuned to stay readable on large proteins — see the DATA SELECTION knobs.
# Applies to : .pta files produced by `trajectory h-bonds`
# Alias names recognized by the parser:
#   HBONDS-NETWORK / HBONDS_NETWORK / HB-NETWORK / HB_NETWORK
# ============================================================================

[HBONDS-NETWORK]

# ---------------- FIGURE ----------------
fig_size_width   = 12
fig_size_height  = 12
fig_dpi          = 300
fig_basename     = hbonds_network
fig_format       = png
bg_color         = white

# ---------------- TITLE ----------------
fig_title        = Hydrogen Bond Network

# ---------------- SOURCE MODE ----------------
mode             = mode2          # mode2 = once-per-frame ⇒ occupancy in [0, 1]

# ---------------- DATA SELECTION (large-protein friendly) ----------------
threshold        = 0.3            # keep only bonds at/above this occupancy
top_n            = 200            # keep the N strongest edges (0 = all)
min_seq_sep      = 0              # drop |i-j| <= this within a chain (0 = off);
                                  # set e.g. 2 to hide sequential backbone bonds
largest_component = False         # True = keep only the largest connected network

# ---------------- LABELING ----------------
representation   = chainid:resnameresid
aa3_to_aa1       = True
label_top_n      = 15             # label the N highest-degree hubs (0 = none, -1 = all)

# ---------------- LAYOUT ----------------
layout           = spring         # spring | kamada_kawai | circular
seed             = 42

# ---------------- NODES (size scales with degree) ----------------
node_size_min    = 50
node_size_max    = 600
node_color       = "#cfe8ff"
node_edge_color  = "#1f4e79"

# ---------------- EDGES (colored by occupancy) ----------------
edge_cmap        = viridis
edge_width_min   = 0.5
edge_width_max   = 4.0
edge_alpha       = 0.7

# ---------------- COLORBAR ----------------
disable_colorbar = False
