# Pharmacon — Plot Config: Ligand RMSF (per-atom)
# ----------------------------------------------------------------------------
# Tailored for a single-residue ligand: every atom gets its own x-axis slot,
# labelled with both the topology atom number and the atom name (e.g.
# "4523 C1", "4524 C2", …). This avoids the stacking that happens when
# x_axis=resid is used on a ligand (all atoms share one resid).
#
# Produce the input PTA with something like:
#   pharmacon trajectory rmsf -p topol.tpr -x traj.xtc \
#       -sel "resname LIG" -n ligand \
#       -f "protein and name CA"
#
# Then plot:
#   pharmacon plot pta -i rmsf.pta -o ./plots -c rmsf_ligand.ini
#
# Alias names recognized by the parser:
#   PTA-RMSF
#   PTA_RMSF
# ============================================================================

[PTA-RMSF]

# ---------------- FIGURE ----------------
fig_size_width   = 10            # wider canvas — ligand atoms can be many
fig_size_height  = 5
fig_dpi          = 300
fig_format       = png           # png | svg | pdf | jpg | tif
fig_transparent  = False
tight_layout     = True
bg_color         = white

# ---------------- TITLES / LABELS ----------------
fig_title        = Ligand RMSF
x_label          = Atom (index, name)
y_label          = RMSF (Å)

# ---------------- AXIS LIMITS ----------------
# Often useful for ligand plots so the y-axis is comparable across runs.
#   y_min = 0
#   y_max = 3.0
x_min            = auto
x_max            = auto
y_min            = auto
y_max            = auto

# Per-atom placement (0..N-1) so atoms never stack at the same x.
# `atom_name` also sets a sensible default tick template; we override
# below to show "atom_index atom_name" — adjust to taste.
x_axis           = atom_name

# ---------------- CUSTOM X-TICK LABELS ----------------
# Available fields: {atom_index} {resid} {resname} {atom_name} {position}
# Alternatives you might want:
#   xtick_format = {atom_name}                — just names (C1, C2, N4, …)
#   xtick_format = {atom_index}               — just topology indices
#   xtick_format = {resname}{resid}-{atom_name}  — LIG901-C1, LIG901-C2, …
xtick_format     = {atom_index} {atom_name}
xtick_rotation   = 90            # vertical labels keep each atom slot readable
xtick_max_labels = 200           # ligands rarely exceed this; safe ceiling

# ---------------- FONTS ----------------
font_family       = dejavu sans
font_size_title   = 14
font_weight_title = bold
font_size_label   = 11
font_weight_label = normal
font_size_ticks   = 7            # smaller so per-atom labels don't crowd
font_size_legend  = 9
font_weight_legend = normal

# ---------------- LINES ----------------
line_width       = 1.8
line_alpha       = 1.0
line_style       = solid

# Single-selection ligand plots usually need only the first colour.
line_colors      = "#1f77b4", "#ff7f0e", "#2ca02c", "#d62728"
cycle_colors     = True

# Per-selection color overrides — useful when you run multiple selections
# (e.g. ligand scaffold vs tail) and want a fixed color for each name.
# NOTE: wrap the WHOLE value in double quotes — the '#' in hex colours is
#       otherwise treated as a comment by the INI parser.
#   colors_by_label = "ligand:#d62728, scaffold:#1f77b4"
colors_by_label  =

# ---------------- STD BAND ----------------
# Only drawn if the PTA file is merged (records carry mean ± std per atom).
show_std_band    = True
std_band_alpha   = 0.25

# ---------------- GRID ----------------
enable_grid      = True
grid_style       = dashed
grid_alpha       = 0.35

# ---------------- LEGEND ----------------
disable_legend   = False
legend_frame     = True
legend_alpha     = 1.0

# ---------------- SHADED REGIONS (optional) ----------------
# When `x_axis = atom_name`, shading is by 0..N-1 atom position.
# Example: shade the first 12 atoms (a fragment) and the last 8 (another).
# NOTE: wrap the WHOLE value in double quotes — commas and the '#' in hex
#       colours are otherwise mangled by the INI parser.
#   shading = "0,11,#888888,0.3,scaffold; 22,29,#ffa500,0.3,tail"
shading              =
shading_alpha        = 0.25
shading_show_legend  = False

# ---------------- BEHAVIOR ----------------
plot_multiple    = False         # one ligand selection → overlay is fine
disable_title    = False
