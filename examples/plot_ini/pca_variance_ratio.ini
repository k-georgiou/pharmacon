# ============================================================================
# Pharmacon — Plot Config: PCA Explained Variance (Scree Plot)
# ----------------------------------------------------------------------------
# Applies to : .pta files with a PCA dataset
# Alias names recognized by the parser:
#   PCA-VARIANCE-RATIO
#   PCA_VARIANCE_RATIO
#   PCA-SCREE
#   PCA_SCREE
# ============================================================================

[PCA-VARIANCE-RATIO]

# ---------------- FIGURE ----------------
fig_size_width   = 8
fig_size_height  = 6
fig_dpi          = 300
fig_basename     = pca_variance_ratio
fig_format       = png
fig_transparent  = False
tight_layout     = True
bg_color         = white

# ---------------- TITLES / LABELS ----------------
fig_title        = PCA Explained Variance
x_label          = Principal Component
y_label          = Explained Variance Ratio

# ---------------- FONTS ----------------
font_family       = dejavu sans
font_size_title   = 14
font_size_label   = 12
font_size_ticks   = 10
font_weight_title = bold

# ---------------- BARS & CUMULATIVE LINE ----------------
bar_alpha             = 0.8
cumulative_line       = True
cumulative_line_width = 2.0
cumulative_alpha      = 0.9

# ---------------- GRID ----------------
enable_grid      = True
grid_style       = dashed
grid_alpha       = 0.3

disable_title    = False
