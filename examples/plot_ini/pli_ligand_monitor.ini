# ============================================================================
# Pharmacon — Plot Config: PLI Ligand Monitor (contact heatmap)
# ----------------------------------------------------------------------------
# Grouping   : protein residues (Group 1) × ligand atoms (Group 2)
# Applies to : .pta files
# Alias names recognized by the parser:
#   PLI-LIGAND-MONITOR
#   PLI_LIGAND_MONITOR
#   PL-INTERACTIONS-LIGAND-MONITOR
#   PL_INTERACTIONS_LIGAND_MONITOR
# ============================================================================

[PLI-LIGAND-MONITOR]

# ---------------- FIGURE ----------------
fig_size_width   = 10
fig_size_height  = 8
fig_dpi          = 300
fig_basename     = pli_ligand_monitor
fig_format       = png
fig_transparent  = False
tight_layout     = True
bg_color         = white

# ---------------- TITLES / LABELS ----------------
fig_title        = Residue ↔ Ligand Atom Contact Frequency
x_label          = Ligand atom (Group 2)
y_label          = Protein residue (Group 1)

# ---------------- FONTS ----------------
font_family       = dejavu sans
font_size_x       = 10
font_weight_x     = normal
font_size_y       = 10
font_weight_y     = normal
font_size_label   = 12
font_weight_label = bold
font_size_title   = 16
font_weight_title = bold
font_size_cbar    = 10
font_weight_cbar  = normal

# ---------------- TICKS ----------------
x_tick_rotation  = 90.0
y_tick_rotation  = 0.0

# ---------------- FILTERS ----------------
threshold        = 0.02
drop_empty_rows  = True
drop_empty_cols  = True

# ---------------- RESIDUE LABELING ----------------
y_axis_representation = chainid:resnameresid
aa3_to_aa1        = False
renumber          = False
renumber_int      =
alter_chains      = False
alter_segments    = False
alter_chains_str  =
alter_segments_str =

# ---------------- VALUE MAPPING ----------------
cmap             = viridis
vmin             = 0.0
vmax             = 1.0
interpolation    = nearest

# ---------------- GRID ----------------
enable_grid      = False
grid_color       = black
grid_linewidth   = 0.2

# ---------------- COLORBAR ----------------
disable_colorbar = False
cbar_orientation = vertical
cbar_shrink      = 1.0
cbar_pad         = 0.04

# ---------------- DISABLE FLAGS ----------------
disable_title    = False
disable_x_axis   = False
disable_y_axis   = False
disable_x_label  = False
disable_y_label  = False
disable_ticks    = False
