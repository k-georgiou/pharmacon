# ============================================================================
# Pharmacon — Plot Config: Protein–Ligand Interactions, Stacked Column (Type 2)
# ----------------------------------------------------------------------------
# Grouping   : per residue, stacked bars split by Backbone vs Side chain
# Applies to : .pta files (non-merged only)
# Alias names recognized by the parser:
#   PLI-STACKED-COLUMN-2
#   PLI_STACKED_COLUMN_2
#   PL-INTERACTIONS-STACKED-COLUMN-2
#   PL-INTERACTIONS_STACKED_COLUMN_2
# ============================================================================

[PLI-STACKED-COLUMN-2]

# ---------------- FIGURE ----------------
fig_size_width   = 6
fig_size_height  = 4
fig_dpi          = 800
fig_basename     = pli_stacked_column_2
fig_format       = png
fig_transparent  = False
tight_layout     = True
bg_color         = white

# ---------------- TITLES / LABELS ----------------
fig_title        = Protein-Ligand Interactions Stacked Column 2
x_label          = Residues
y_label          = Frequency

# ---------------- FONTS ----------------
font_family      = dejavu sans
font_size_x      = 8
font_weight_x    = normal
font_size_y      = 8
font_weight_y    = normal
font_size_title  = 14
font_weight_title = bold
font_size_legend = 8
font_weight_legend = normal
font_size_label  = 8
font_weight_label = normal
font_size_ticks  = 8
font_weight_ticks = normal

# ---------------- TICKS ----------------
x_tick_rotation  = 90
y_tick_rotation  = 0

# ---------------- FILTER ----------------
threshold        = 0.02

# ---------------- DISABLE FLAGS ----------------
disable_x_axis   = False
disable_y_axis   = False
disable_x_label  = False
disable_y_label  = False
disable_title    = False
disable_legend   = False
disable_ticks    = False

# ---------------- GRID ----------------
enable_grid      = True
grid_style       = dashed
grid_color       = lightgray
grid_alpha       = 0.5

# ---------------- BARS ----------------
bar_width        = 0.8
bar_edge_color   = black
bar_alpha        = 0.8
bar_edge_width   = 0.5

# ---------------- Y LIMITS ----------------
y_limit_min      =
y_limit_max      =

# ---------------- LEGEND ----------------
legend_loc       = upper right
legend_bbox_y    = 0
legend_n_col     = 2
legend_frame     = True
legend_alpha     = 1.0
legend_margin_bottom = 0.02

# ---------------- BACKBONE / SIDE CHAIN COLORS ----------------
color_backbone   = #b28dff
color_side_chain = #aff8db

# ---------------- RESIDUE LABELING ----------------
aa3_to_aa1       = True
renumber         = False
renumber_int     =
alter_chains     = False
alter_segments   = False
alter_chains_str   =
alter_segments_str =
x_axis_representation = chainid:resnameresid
