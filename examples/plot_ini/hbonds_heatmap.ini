# ============================================================================
# Pharmacon — Plot Config: Hydrogen-Bond Residue×Residue Frequency Heatmap
# ----------------------------------------------------------------------------
# Grouping   : residue × residue H-bond contact frequency map
# Applies to : .pta files produced by `trajectory h-bonds`
# Alias names recognized by the parser:
#   HBONDS-HEATMAP / HBONDS_HEATMAP / HB-HEATMAP / HB_HEATMAP
# ============================================================================

[HBONDS-HEATMAP]

# ---------------- FIGURE ----------------
fig_size_width   = 16
fig_size_height  = 14
fig_dpi          = 300
fig_basename     = hbonds_heatmap
fig_format       = png
bg_color         = white

# ---------------- TITLES / LABELS ----------------
fig_title        = Hydrogen Bond Contact Frequency
x_label          = Residue
y_label          = Residue

# ---------------- FILTERS ----------------
threshold        = 0.02           # drop pairs below this mean frequency
min_total        = 0.0
top_n            = 0              # 0 = keep all; N = keep N strongest pairs
symmetric        = True

# ---------------- LABELING ----------------
representation   = chainid:resnameresid
aa3_to_aa1       = False

# ---------------- VALUE MAPPING ----------------
cmap             = viridis
vmin             = 0.0
vmax             =                # empty = auto
interpolation    = nearest

# ---------------- COLORBAR ----------------
cbar_orientation = vertical
