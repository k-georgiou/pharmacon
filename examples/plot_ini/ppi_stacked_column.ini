# ============================================================================
# Pharmacon — Plot Config: Protein–Protein Interactions Stacked Column
# ----------------------------------------------------------------------------
# Grouping   : per residue-pair, stacked bars per interaction type
# Applies to : .pta files
# Alias names recognized by the parser:
#   PPI-STACKED-COLUMN
#   PPI_STACKED_COLUMN
#   PP-STACKED
#   PP_STACKED
# ============================================================================

[PPI-STACKED-COLUMN]

# ---------------- FIGURE ----------------
fig_size_width   = 30
fig_size_height  = 4
fig_dpi          = 300
fig_basename     = ppi_stacked_column
fig_format       = png
fig_transparent  = False
tight_layout     = False
bg_color         = white

# ---------------- TITLES / LABELS ----------------
fig_title        = Protein–Protein Interactions
x_label          = Residue–Residue Pair
y_label          = Interaction Frequency

# ---------------- FONTS ----------------
font_family       = dejavu sans
font_size_x       = 10
font_size_y       = 12
font_size_label   = 10
font_size_title   = 24
font_size_legend  = 8
font_weight_title = bold
font_weight_label = bold

# ---------------- TICKS ----------------
x_tick_rotation  = 90.0
y_tick_rotation  = 0.0

# ---------------- FILTER ----------------
threshold        = 0.05

# ---------------- Y LIMITS ----------------
y_limit_min      =
y_limit_max      =

# ---------------- BARS ----------------
bar_width        = 0.9
bar_edge_color   = black
bar_edge_width   =                # empty = matplotlib default
bar_alpha        = 1.0

# ---------------- GRID ----------------
enable_grid      = True
grid_style       = --
grid_alpha       = 0.5

# ---------------- LEGEND ----------------
disable_legend   = True
legend_loc       = upper center
legend_bbox_y    = -0.20
legend_n_col     = 5
legend_frame     = False
legend_alpha     = 1.0
legend_margin_bottom = 0.28

# ---------------- LABELING ----------------
representation   = chainid:resnameresid
aa3_to_aa1       = True
renumber         = False
renumber_int     =
alter_chains     = False
alter_segments   = False
alter_chains_str   =
alter_segments_str =

# ---------------- DISABLE FLAGS ----------------
disable_title    = False
disable_x_axis   = False
disable_y_axis   = False
disable_ticks    = False

# ---------------- ERROR BARS (merged .pta only) ----------------
error_bars            = True
error_bars_capsize    = 3
error_bars_color      = black
error_bars_alpha      = 0.5
error_bars_line_width = 0.5
error_bars_line_style = solid

# ---------------- INTERACTION COLORS ----------------
color_hydrophobic    = "#b39ddb"
color_hydrogen_bonds = "#f1c40f"
color_pi_cation      = "#e67e22"
color_pi_stacking    = "#2ecc71"
color_water_bridge_1 = "#3498db"
color_ionic          = "#ff3333"
color_halogen        = "#f49ac2"
color_metal_contact  = "#95a5a6"
