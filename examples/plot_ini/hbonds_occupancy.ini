# ============================================================================
# Pharmacon — Plot Config: Hydrogen-Bond Occupancy (ranked bar)
# ----------------------------------------------------------------------------
# Grouping   : per residue-pair % occupancy (fraction of frames present),
#              strongest at top. Built from mode2 (once-per-frame).
# Applies to : .pta files produced by `trajectory h-bonds`
# Alias names recognized by the parser:
#   HBONDS-OCCUPANCY / HBONDS_OCCUPANCY / HB-OCCUPANCY / HB_OCCUPANCY
# ============================================================================

[HBONDS-OCCUPANCY]

# ---------------- FIGURE ----------------
fig_size_width   = 8
fig_size_height  = 10
fig_dpi          = 300
fig_basename     = hbonds_occupancy
fig_format       = png
bg_color         = white

# ---------------- TITLES / LABELS ----------------
fig_title        = Hydrogen Bond Occupancy
x_label          = Occupancy (fraction of frames)
y_label          = Residue Pair

# ---------------- DATA SELECTION ----------------
top_n            = 25             # keep the N most-occupied pairs (0 = all)
threshold        = 0.0            # drop pairs below this occupancy

# ---------------- BARS ----------------
bar_color        = "#3498db"
bar_alpha        = 0.9
bar_edge_color   = black
bar_edge_width   = 0.5

# ---------------- LABELING ----------------
representation   = chainid:resnameresid
aa3_to_aa1       = True

# ---------------- GRID ----------------
enable_grid      = True
grid_style       = dashed
grid_alpha       = 0.4
