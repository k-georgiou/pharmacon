# ============================================================================
# Pharmacon — Plot Config: Protein–Ligand Interactions Heatmap (Type 2)
# ----------------------------------------------------------------------------
# Grouping   : interaction type × frame; dynamic sizing depending on data
# Applies to : .pta files (non-merged only)
# Alias names recognized by the parser:
#   PLI-HEATMAP-2
#   PLI_HEATMAP_2
#   PL-INTERACTIONS-HEATMAP-2
#   PL_INTERACTIONS_HEATMAP_2
# ============================================================================

[PLI-HEATMAP-2]

# ---------------- FIGURE (auto-sized unless set) ----------------
fig_size_width   =                # empty → auto from data
fig_size_height  =                # empty → auto from data
fig_dpi          = 800
fig_basename     = pli_heatmap_2
fig_format       = png
fig_transparent  = False
tight_layout     = True
bg_color         = white

# ---------------- TITLES / LABELS ----------------
fig_title        = Protein–Ligand Interaction Frequency Heatmap
x_label          = Frame
y_label          = Interaction type

# ---------------- FONTS ----------------
font_family       = dejavu sans
font_size_x       = 10
font_weight_x     = normal
font_size_y       = 10
font_weight_y     = normal
font_size_label   = 10
font_weight_label = normal
font_size_title   = 12
font_weight_title = bold
font_size_cbar    = 10

# ---------------- TICKS ----------------
x_tick_rotation  = 90.0
y_tick_rotation  = 0.0

# ---------------- DATA FILTERING ----------------
drop_empty_rows  = True
threshold        = 0.02
normalize        = none           # none | by_frame | max1

# ---------------- X TICK DENSITY ----------------
xtick_max        = 50

# ---------------- DISABLE FLAGS ----------------
disable_x_axis   = False
disable_y_axis   = False
disable_x_label  = False
disable_y_label  = False
disable_title    = False
disable_legend   = False
disable_ticks    = False

# ---------------- X LIMITS ----------------
x_limit_min      =
x_limit_max      =

# ---------------- AUTO-SIZING ----------------
per_frame_in     = 0.10           # inches per frame
per_inter_in     = 0.85           # inches per interaction type
min_width        = 24.0
max_width        = 42.0
min_height       = 18.0
max_height       = 100.0

# ---------------- CELL GRID ----------------
enable_grid      = False
grid_color       = black
grid_linewidth   = 0.2

# ---------------- VALUE MAPPING ----------------
cmap             = viridis
vmin             =
vmax             =
interpolation    = nearest

# ---------------- COLORBAR ----------------
cbar_orientation = vertical
cbar_shrink      = 1.0
cbar_pad         = 0.04
