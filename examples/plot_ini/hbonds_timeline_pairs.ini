# ============================================================================
# Pharmacon — Plot Config: Hydrogen-Bond Pair Occupancy Timeline
# ----------------------------------------------------------------------------
# Grouping   : residue-pair (rows) × frame (cols), present/absent heatmap.
#              The classic H-bond persistence plot.
# Applies to : .pta files produced by `trajectory h-bonds` (non-merged only)
# Alias names recognized by the parser:
#   HBONDS-TIMELINE-PAIRS / HBONDS_TIMELINE_PAIRS / HB-TIMELINE / HB_TIMELINE
# ============================================================================

[HBONDS-TIMELINE-PAIRS]

# ---------------- FIGURE ----------------
fig_size_width   = 14
fig_size_height  = 8
fig_dpi          = 300
fig_basename     = hbonds_timeline_pairs
fig_format       = png
bg_color         = white

# ---------------- TITLES / LABELS ----------------
fig_title        = Hydrogen Bond Pairs – Timeline
x_label          = Frame
y_label          = Residue Pair

# ---------------- DATA SELECTION ----------------
top_n            = 50             # keep the N strongest pairs
threshold        = 0.02
drop_empty_rows  = True
xtick_max        = 50             # thin frame ticks to ~this many (avoids overlap)

# ---------------- LABELING ----------------
representation   = chainid:resnameresid
aa3_to_aa1       = False

# ---------------- VALUE MAPPING ----------------
cmap             = gnuplot
vmin             = 0.0
vmax             = 1.0
interpolation    = nearest
