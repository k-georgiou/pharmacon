# ============================================================================
# Pharmacon — Plot Config: RMSF Profile
# ----------------------------------------------------------------------------
# Per-atom Root Mean Square Fluctuation, one curve per selection.
# Applies to : .pta files produced by `trajectory rmsf`, both single and
#              merged (mean ± std band drawn automatically on merged files).
# Alias names recognized by the parser:
#   PTA-RMSF
#   PTA_RMSF
# ============================================================================

[PTA-RMSF]

# ---------------- FIGURE ----------------
fig_size_width   = 8
fig_size_height  = 5
fig_dpi          = 300
fig_format       = png
fig_transparent  = False
tight_layout     = True
bg_color         = white

# ---------------- TITLES / LABELS ----------------
fig_title        = RMSF Profile
x_label          = Residue
y_label          = RMSF (Å)
x_axis           = resid           # resid | atom_index | position | atom_name

# ---------------- AXIS LIMITS ----------------
# "auto" lets matplotlib pick; set numeric values to clamp.
#   y_min = 0      → start y at zero
#   y_max = 3.5    → cap RMSF at 3.5 Å
x_min            = auto
x_max            = auto
y_min            = auto
y_max            = auto

# ---------------- CUSTOM X-TICK LABELS ----------------
# Empty xtick_format = auto:
#   x_axis = atom_name → "{atom_name}" tick labels (e.g. C1, C2, N4 …)
#   other modes        → matplotlib's default numeric ticks
# Set a Python format string to customize; fields available:
#   {atom_index} {resid} {resname} {atom_name} {position}
# Examples:
#   xtick_format = {atom_name}
#   xtick_format = {atom_index} {atom_name}
#   xtick_format = {resname}{resid}-{atom_name}
xtick_format     =
xtick_rotation   = auto            # auto | 0 | 45 | 90 | -45 …
xtick_max_labels = 200             # thin ticks once more than this many

# ---------------- FONTS ----------------
font_family       = dejavu sans
font_size_title   = 14
font_weight_title = bold
font_size_label   = 10
font_weight_label = normal
font_size_ticks   = 8
font_size_legend  = 8
font_weight_legend = normal

# ---------------- LINES ----------------
line_width       = 1.5
line_alpha       = 1.0
line_style       = solid           # solid | dashed | dotted | dashdot

# Accepts a comma-separated list of colors; cycled per series:
line_colors      = "#1f77b4", "#ff7f0e", "#2ca02c", "#d62728", "#9467bd", "#8c564b", "#e377c2", "#7f7f7f", "#bcbd22", "#17becf"
cycle_colors     = True

# Per-selection color overrides. Format: "label:hex, label:hex".
# Selections not listed fall back to `line_colors` cycling.
#   colors_by_label = calpha:"#d62728", backbone:"#1f77b4"
colors_by_label  =

# ---------------- STD BAND (mean ± std for merged .pta) ----------------
show_std_band    = True
std_band_alpha   = 0.25

# ---------------- SHADED BACKGROUND REGIONS ----------------
# Semicolon-separated list of regions. Each region:
#   start, end, color [, alpha [, label]]
# start/end are interpreted in the SAME units as `x_axis`:
#   x_axis=resid       → residue numbers (e.g. 0,10 = residues 0 through 10)
#   x_axis=atom_index  → topology atom indices
#   x_axis=position    → 0..N-1 dataset positions
#   x_axis=atom_name   → 0..N-1 dataset positions (atom_name is categorical)
# Examples:
#   shading = 0,10,"#888888"; 11,100,"#ffa500"
#   shading = 0,10,"#888888",0.3,N-term; 11,100,"#ffa500",0.3,domain A
shading             =
shading_alpha       = 0.25
shading_show_legend = False

# ---------------- GRID ----------------
enable_grid      = True
grid_style       = dashed
grid_alpha       = 0.4

# ---------------- LEGEND ----------------
disable_legend   = False
legend_frame     = True
legend_alpha     = 1.0

# ---------------- BEHAVIOR ----------------
plot_multiple    = False           # False = overlay; True = one figure per selection
disable_title    = False
