# ============================================================================
# Pharmacon — Plot Config: Protein–Ligand Interactions Heatmap (Type 1)
# ----------------------------------------------------------------------------
# Grouping   : residues × frames, colored by aggregated interaction intensity
# Applies to : .pta files (non-merged only)
# Alias names recognized by the parser:
#   PLI-HEATMAP-1
#   PLI_HEATMAP_1
#   PL-INTERACTIONS-HEATMAP-1
#   PL_INTERACTIONS_HEATMAP_1
# ============================================================================

[PLI-HEATMAP-1]

# ---------------- FIGURE ----------------
fig_size_width   = 10.0
fig_size_height  = 6.0
fig_dpi          = 600
fig_basename     = pli_heatmap_1
fig_format       = png
fig_transparent  = False
tight_layout     = True
bg_color         = white

# ---------------- TITLES / LABELS ----------------
fig_title        = Protein-Ligand Interaction Heatmap
x_label          = Frame
y_label          = Residue

# ---------------- FONTS ----------------
font_family       = dejavu sans
font_size_x       = 8
font_weight_x     = normal
font_size_y       = 8
font_weight_y     = normal
font_size_label   = 10
font_weight_label = normal
font_size_title   = 12
font_weight_title = bold
font_size_cbar    = 8
font_weight_cbar  = normal

# ---------------- TICKS ----------------
x_tick_rotation  = 90.0
y_tick_rotation  = 0.0

# ---------------- DISABLE FLAGS ----------------
disable_x_axis   = False
disable_y_axis   = False
disable_x_label  = False
disable_y_label  = False
disable_title    = False
disable_legend   = False
disable_ticks    = False

# ---------------- VALUE MAPPING ----------------
threshold        = 0.02
cmap             = viridis
vmin             = 0.0
vmax             =                # empty = auto
interpolation    = nearest        # nearest | bilinear | bicubic ...

# ---------------- COLORBAR ----------------
cbar_orientation = vertical       # vertical | horizontal
cbar_shrink      = 1.0
cbar_pad         = 0.04

# ---------------- RESIDUE LABELING ----------------
aa3_to_aa1       = False
renumber         = False
renumber_int     =
alter_chains     = False
alter_segments   = False
alter_chains_str   =
alter_segments_str =
y_axis_representation = chainid:resnameresid
