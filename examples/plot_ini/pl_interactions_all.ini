# ============================================================================
# Pharmacon — Plot Config: Protein–Ligand Interactions (ALL plot types)
# ----------------------------------------------------------------------------
# A single, MINIMALISTIC config covering every plot that
#     pharmacon plot pta -i <pl_interactions.pta>
# produces. Each section lists only the most useful knobs; any field not shown
# keeps its built-in default. For exhaustive, per-field templates see the
# sibling files:
#     pli_stacked_column_1.ini   pli_stacked_column_2.ini
#     pli_heatmap_1.ini          pli_heatmap_2.ini
#     pli_pie_charts_1.ini       pli_ligand_monitor.ini
#
# Usage:
#     pharmacon plot pta -i pl_interactions.pta -o plots/ \
#                        -c examples/plot_ini/pl_interactions_all.ini --overwrite
#
# Notes:
#   * Section headers are case-insensitive; the canonical PLI alias is used
#     below (the PL-INTERACTIONS-... aliases work too).
#   * Hex colors MUST be quoted ("#rrggbb") — an unquoted # starts a comment.
#   * Leave a value empty (e.g. "vmax =") to fall back to the automatic default.
#   * Sections not relevant to the file being plotted are ignored, so this
#     config is safe to reuse across runs.
# ============================================================================


# -- 1. Stacked column: per residue, stacked by interaction type -------------
[PLI-STACKED-COLUMN-1]
fig_dpi               = 300
fig_format            = png          # png | pdf | svg | jpg | tiff
fig_title             = Protein-Ligand Interactions (by interaction type)
threshold             = 0.02         # drop residues below this total frequency
bar_width             = 0.8
legend_n_col          = 4
error_bars            = True         # merged .pta carry std -> error bars
x_axis_representation = chainid:resnameresid
color_hydrogen_bonds  = "#f1c40f"
color_hydrophobic     = "#b39ddb"


# -- 2. Stacked column: per residue, backbone vs side-chain ------------------
[PLI-STACKED-COLUMN-2]
fig_dpi          = 300
fig_format       = png
fig_title        = Protein-Ligand Interactions (backbone vs side-chain)
threshold        = 0.02
color_backbone   = "#b28dff"
color_side_chain = "#aff8db"


# -- 3. Heatmap: residue x frame occupancy -----------------------------------
[PLI-HEATMAP-1]
fig_dpi       = 300
fig_format    = png
fig_title     = Protein-Ligand Interaction Heatmap (residue x frame)
threshold     = 0.02
cmap          = viridis
vmin          = 0.0
vmax          =                      # empty = auto
interpolation = nearest


# -- 4. Heatmap: interaction type x frame ------------------------------------
[PLI-HEATMAP-2]
fig_dpi       = 300
fig_format    = png
fig_title     = Protein-Ligand Interaction Frequency Heatmap (type x frame)
threshold     = 0.02
cmap          = viridis
vmin          =                      # empty = auto
vmax          =                      # empty = auto
interpolation = nearest


# -- 5. Pie charts: one pie per interaction type (collage) -------------------
[PLI-PIE-CHARTS-1]
fig_dpi               = 150
fig_format            = png
disable_labels        = False
disable_autopct       = False        # show per-slice percentages
disable_overall_title = False


# -- 6. Ligand monitor: protein residue x ligand atom contact frequency ------
[PLI-LIGAND-MONITOR]
fig_dpi          = 300
fig_format       = png
fig_title        = Residue - Ligand Atom Contact Frequency
threshold        = 0.02
cmap             = viridis
vmin             = 0.0
vmax             = 1.0
disable_colorbar = False
