# ============================================================================
# Pharmacon — Plot Config: Protein–Ligand Interactions, Stacked Column (Type 1)
# ----------------------------------------------------------------------------
# Grouping   : per residue, stacked bars per interaction type
# Applies to : .pta files (non-merged and merged, depending on aliases below)
# Alias names recognized by the parser (pick ANY ONE as the section header):
#   PLI-STACKED-COLUMN-1
#   PLI_STACKED_COLUMN_1
#   PL-INTERACTIONS-STACKED-COLUMN-1
#   PL-INTERACTIONS_STACKED_COLUMN_1
#   MERGED-PLI-STACKED-COLUMN-1
#   MERGED-PLI_STACKED_COLUMN_1
#   MERGED-PL-INTERACTIONS-STACKED-COLUMN-1
#   MERGED-PL-INTERACTIONS_STACKED_COLUMN_1
# ============================================================================

[PLI-STACKED-COLUMN-1]

# ---------------- FIGURE ----------------
fig_size_width   = 6
fig_size_height  = 4
fig_dpi          = 800
fig_basename     = pli_stacked_column_1
fig_format       = png           # png | pdf | svg | jpg | tiff
fig_transparent  = False
tight_layout     = False
bg_color         = white

# ---------------- TITLES / LABELS ----------------
fig_title        = Protein-Ligand Interactions Stacked Column 1
x_label          = Residues
y_label          = Frequency

# ---------------- FONTS ----------------
font_family      = dejavu sans
font_size_x      = 8
font_weight_x    = normal
font_size_y      = 8
font_weight_y    = normal
font_size_title  = 14
font_weight_title = bold
font_size_legend = 8
font_weight_legend = normal
font_size_label  = 8
font_weight_label = normal
font_size_ticks  = 8
font_weight_ticks = normal

# ---------------- TICKS ----------------
x_tick_rotation  = 90
y_tick_rotation  = 0

# ---------------- THRESHOLD (filtering) ----------------
threshold        = 0.02          # drop residues whose total frequency is below this

# ---------------- DISABLE FLAGS ----------------
disable_x_axis   = False
disable_y_axis   = False
disable_x_label  = False
disable_y_label  = False
disable_title    = False
disable_legend   = False
disable_ticks    = False

# ---------------- GRID ----------------
enable_grid      = True
grid_style       = dashed        # solid | dashed | dotted | dashdot
grid_color       = lightgray
grid_alpha       = 0.5

# ---------------- BARS ----------------
bar_width        = 0.8
bar_edge_color   = black
bar_alpha        = 0.8
bar_edge_width   = 0.5

# ---------------- Y LIMITS ----------------
y_limit_min      =               # leave empty for auto
y_limit_max      =

# ---------------- LEGEND ----------------
legend_loc       = lower center
legend_bbox_y    = -0.37
legend_n_col     = 4
legend_frame     = True
legend_alpha     = 1.0
legend_margin_bottom = 0.02

# ---------------- INTERACTION COLORS ----------------
color_hydrophobic    = "#b39ddb"
color_hydrogen_bonds = "#f1c40f"
color_pi_cation      = "#e67e22"
color_pi_stacking    = "#2ecc71"
color_water_bridge_1 = "#3498db"
color_ionic          = "#ff3333"
color_halogen        = "#f49ac2"
color_metal_contact  = "#95a5a6"

# ---------------- RESIDUE LABELING ----------------
aa3_to_aa1       = True          # show ARG → R etc.
renumber         = False
renumber_int     =               # starting index when renumber=True
alter_chains     = False
alter_segments   = False
alter_chains_str   =             # e.g. A,B,C
alter_segments_str =
x_axis_representation = chainid:resnameresid

# ---------------- ERROR BARS (only shown for merged .pta) ----------------
error_bars            = True
error_bars_capsize    = 3
error_bars_color      = black
error_bars_alpha      = 0.5
error_bars_line_width = 0.5
error_bars_line_style = solid
